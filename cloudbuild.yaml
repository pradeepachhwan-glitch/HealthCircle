steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - BASE_PATH=/
      - --tag
      - gcr.io/healthcircleai-495306/api-server:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/healthcircleai-495306/api-server:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - healthcircle
      - --image
      - gcr.io/healthcircleai-495306/api-server:latest
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 1Gi
      - --set-env-vars
      - NODE_ENV=production
      - --set-env-vars
      - NODE_OPTIONS=--max-old-space-size=768
      - --set-env-vars
      - STATIC_DIR=/app/artifacts/askhealth/dist/public
      - --set-env-vars
      - EMAIL_AUTH_ENABLED=true
      - --set-env-vars
      - BASE_PATH=/
      - --min-instances
      - "0"
      - --timeout
      - "300"
      - --add-cloudsql-instances
      - healthcircleai-495306:asia-south2:healthcircle-db
      - --service-account
      - 857143676433-compute@developer.gserviceaccount.com
      - --update-secrets
      - DATABASE_URL=DATABASE_URL:latest
      - --update-secrets
      - SESSION_SECRET=SESSION_SECRET:latest
      - --update-secrets
      - ADMIN_TOKEN=ADMIN_TOKEN:latest
      - --update-secrets
      - GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
      - --update-secrets
      - GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
      - --update-secrets
      - GEMINI_API_KEY=GEMINI_API_KEY:latest
      - --update-secrets
      - AI_INTEGRATIONS_OPENAI_API_KEY=AI_INTEGRATIONS_OPENAI_API_KEY:latest
      - --update-secrets
      - AI_INTEGRATIONS_OPENAI_BASE_URL=AI_INTEGRATIONS_OPENAI_BASE_URL:latest
      - --update-secrets
      - RESEND_API_KEY=RESEND_API_KEY:latest
      - --update-secrets
      - EMAIL_FROM=EMAIL_FROM:latest
      - --update-secrets
      - GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest
      - --update-secrets
      - VAPID_PUBLIC_KEY=VAPID_PUBLIC_KEY:latest
      - --update-secrets
      - VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest
      - --update-secrets
      - CLERK_SECRET_KEY=CLERK_SECRET_KEY:latest
      - --update-secrets
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:latest

images:
  - gcr.io/healthcircleai-495306/api-server:latest

options:
  logging: CLOUD_LOGGING_ONLY

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: lets us read env(safe-area-inset-*) for the iPhone
         notch + Android cutouts. We deliberately omit maximum-scale and
         user-scalable=no — those break WCAG 1.4.4 (Resize Text) and Apple's
         own accessibility guidance. Input zoom-on-focus is prevented by
         giving every interactive input a font-size ≥ 16px. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HealthCircle — Your Health, Your Community</title>
    <meta name="description" content="India's AI-powered healthcare super app — communities, AI doctor, online consultations, broadcasts and more." />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563EB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1E1B4B" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="HealthCircle" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS / Apple Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HealthCircle" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="HealthCircle — Your Health, Your Community" />
    <meta property="og:description" content="India's AI-powered healthcare super app." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

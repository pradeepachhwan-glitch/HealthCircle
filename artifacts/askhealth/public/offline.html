<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're offline — HealthCircle</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <meta name="theme-color" content="#2563EB" />
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #EEF2FF 0%, #FFFFFF 50%, #E0E7FF 100%);
      color: #0F172A;
      padding: 24px;
    }
    .card {
      max-width: 440px; width: 100%;
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 50px -20px rgba(37,99,235,0.18);
    }
    .icon {
      width: 72px; height: 72px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .icon img { width: 100%; height: 100%; object-fit: contain; }
    h1 { font-size: 22px; margin: 0 0 8px; font-weight: 700; }
    p { color: #475569; font-size: 14px; line-height: 1.55; margin: 0 0 24px; }
    button {
      background: linear-gradient(135deg, #2563EB, #6366F1);
      color: #FFFFFF; border: 0; cursor: pointer;
      padding: 12px 22px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 8px 20px -6px rgba(37,99,235,0.45);
    }
    button:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <img src="/icon-192.png" alt="HealthCircle" />
    </div>
    <h1>You're offline</h1>
    <p>HealthCircle needs an internet connection for live communities, AI consultations and bookings. Reconnect and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>

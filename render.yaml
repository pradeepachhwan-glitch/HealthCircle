databases:
  - name: healthcircle-db
    databaseName: healthcircle
    user: healthcircle
    plan: free

services:
  # 1. Express Backend
  - type: web
    name: healthcircle-api
    env: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: healthcircle-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 8080

  # 2. React Frontend
  - type: web
    name: healthcircle-frontend
    env: static
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/askhealth build
    staticPublishPath: ./artifacts/askhealth/dist
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
    routes:
      # Proxy all /api requests to the backend service
      - type: rewrite
        source: /api/*
        destination: https://healthcircle-api.onrender.com/api/*
      # Fallback for React Router (Single Page Application)
      - type: rewrite
        source: /*
        destination: /index.html
